name: World Cup News

on:
  schedule:
    # Run every 30 minutes to counteract GitHub Actions scheduling queues
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: worldcup-push
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run World Cup Updates
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python worldcup_updates.py

      - name: Save World Cup History
        continue-on-error: true
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Ensure history tracking infrastructure exists
          if [ ! -f worldcup_posted_articles.json ]; then
            echo "[]" > worldcup_posted_articles.json
          fi

          git add worldcup_posted_articles.json

          # Only push changes back to the repository if new items were captured
          if ! git diff --staged --quiet; then
            git commit -m "Update World Cup history tracking files [skip ci]"
            git pull --rebase origin main || true
            git push origin HEAD:main || true
          else
            echo "No history modifications encountered. Ending session clean."
          fi
