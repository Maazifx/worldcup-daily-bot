name: Football News Bot

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:

  news:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run News Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Save News History
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add posted_articles.txt

          if ! git diff --staged --quiet; then
            git commit -m "Update news history"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi

  worldcup:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run World Cup Updates
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python worldcup_updates.py

  standings:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run Standings Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python standings.py
